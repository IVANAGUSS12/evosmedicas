<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Imprimir · {{ titulo }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body class="print-page">
  <header class="print-toolbar">
    <div>
      <strong>{{ titulo }}</strong>
      <span>Si el diálogo no aparece automáticamente, presioná Imprimir.</span>
    </div>
    <div class="print-actions">
      <button type="button" id="print-button">Imprimir</button>
      <button type="button" class="button secondary" onclick="window.close()">Cerrar</button>
    </div>
  </header>
  <iframe
    id="pdf-frame"
    class="print-frame"
    src="{{ pdf_url }}"
    title="{{ titulo }}"
  ></iframe>
  <script>
  (() => {
    const frame = document.getElementById("pdf-frame");
    const printPdf = () => {
      try {
        frame.contentWindow.focus();
        frame.contentWindow.print();
      } catch (_) {
        window.print();
      }
    };
    document.getElementById("print-button").addEventListener("click", printPdf);
    frame.addEventListener("load", () => setTimeout(printPdf, 900));
  })();
  </script>
</body>
</html>
